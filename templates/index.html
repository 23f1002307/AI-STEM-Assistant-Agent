<!DOCTYPE html>
<html>
<head>
    <title>AI STEM Assistant</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<div class="container">
    <h1>AI STEM Accessibility Assistant</h1>

    <input type="file" id="imageInput">
    <button onclick="upload()">Extract Info</button>

    <div id="result"></div>

    <div id="chatSection" style="display:none;">
        <h3>Ask a follow-up question</h3>
        <input type="text" id="questionInput" placeholder="Type your question">
        <button onclick="askQuestion()">Ask</button>
        <div id="chatResponse"></div>
    </div>
</div>

<script>
let currentFileId = null;

async function upload() {
    const file = document.getElementById("imageInput").files[0];

    const formData = new FormData();
    formData.append("file", file);

    const response = await fetch("/analyze", {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    if (data.error) {
        document.getElementById("result").innerText = data.error;
        return;
    }

    currentFileId = data.file_id;

    document.getElementById("result").innerHTML = data.output;

    document.getElementById("chatSection").style.display = "block";
}

async function askQuestion() {
    const question = document.getElementById("questionInput").value;

    const response = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            file_id: currentFileId,
            question: question
        })
    });

    const data = await response.json();

    if (data.error) {
        document.getElementById("chatResponse").innerText = data.error;
        return;
    }

    document.getElementById("chatResponse").innerHTML = data.answer;
}
</script>

</body>
</html>
